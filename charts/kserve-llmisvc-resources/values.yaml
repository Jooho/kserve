# -- Common labels to add to all resources
commonLabels: {}

# -- Common annotations to add to all resources
commonAnnotations: {}

kserve:
  # -- Version of KServe LLM ISVC components
  version: v0.16.0
  createSharedResources: true
  inferenceServiceConfig:
    enabled: ""
  certManager:
    enabled: ""
  storagecontainer:
    enabled: ""
  llmisvc:
    controller:
      # -- KServe LLM ISVC controller manager container image
      image: kserve/llmisvc-controller

      # -- KServe LLM ISVC controller container image tag
      tag: ""

      # -- Specifies when to pull controller image from registry
      imagePullPolicy: "IfNotPresent"

      # -- Reference to one or more secrets to be used when pulling images
      # For more information, see [Pull an Image from a Private Registry](https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/)
      #
      # For example:
      #  imagePullSecrets:
      #    - name: "image-pull-secret"
      imagePullSecrets: []

      # -- Optional additional labels to add to the controller deployment
      labels: {}

      # -- Optional additional labels to add to the controller Pods
      podLabels: {}

      # -- Optional additional annotations to add to the controller deployment
      annotations: {}

      # -- Optional additional annotations to add to the controller Pods
      podAnnotations: {}

      # -- Optional additional annotations to add to the controller service
      serviceAnnotations: {}

      # -- Pod Security Context
      # For more information, see [Configure a Security Context for a Pod or Container](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/)
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      # -- Container Security Context to be set on the controller component container
      # For more information, see [Configure a Security Context for a Pod or Container](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/)
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

      # -- Metrics bind address
      metricsBindAddress: "127.0.0.1"

      # -- Metrics bind port
      metricsBindPort: "8443"

      # -- The nodeSelector on Pods tells Kubernetes to schedule Pods on the nodes with matching labels
      # For more information, see [Assigning Pods to Nodes](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/)
      #
      # For example:
      #   nodeSelector:
      #     kubernetes.io/arch: amd64
      nodeSelector: {}

      # -- A list of Kubernetes Tolerations, if required
      # For more information, see [Toleration v1 core](https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.27/#toleration-v1-core)
      #
      # For example:
      #   tolerations:
      #   - key: foo.bar.com/role
      #     operator: Equal
      #     value: master
      #     effect: NoSchedule
      tolerations: []

      # -- A list of Kubernetes TopologySpreadConstraints, if required
      # For more information, see [Topology spread constraint v1 core](https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.27/#topologyspreadconstraint-v1-core)
      #
      # For example:
      #   topologySpreadConstraints:
      #   - maxSkew: 2
      #     topologyKey: topology.kubernetes.io/zone
      #     whenUnsatisfiable: ScheduleAnyway
      #     labelSelector:
      #       matchLabels:
      #         app.kubernetes.io/instance: llmisvc-controller-manager
      #         app.kubernetes.io/component: controller
      topologySpreadConstraints: []

      # -- A Kubernetes Affinity, if required
      # For more information, see [Affinity v1 core](https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.27/#affinity-v1-core)
      #
      # For example:
      #   affinity:
      #     nodeAffinity:
      #      requiredDuringSchedulingIgnoredDuringExecution:
      #        nodeSelectorTerms:
      #        - matchExpressions:
      #          - key: foo.bar.com/role
      #            operator: In
      #            values:
      #            - master
      affinity: {}

      # -- Resources to provide to the llmisvc controller pod
      #
      # For example:
      #  resources:
      #    limits:
      #      cpu: 100m
      #      memory: 300Mi
      #    requests:
      #      cpu: 100m
      #      memory: 300Mi
      #
      # For more information, see [Resource Management for Pods and Containers](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
      resources:
        limits:
          cpu: 100m
          memory: 300Mi
        requests:
          cpu: 100m
          memory: 300Mi

      # -- Number of replicas for the controller deployment
      replicas: 1

      # -- Deployment strategy
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0

      # -- Liveness probe configuration
      livenessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 5
        httpGet:
          path: /healthz
          port: 8081

      # -- Readiness probe configuration
      readinessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 5
        httpGet:
          path: /readyz
          port: 8081

      # -- Service configuration
      service:
        # -- Service type
        type: ClusterIP
        # -- Service port for metrics
        port: 8443
        # -- Service target port
        targetPort: metrics

      # -- Service account configuration
      serviceAccount:
        # -- Name of the service account to use
        # If not set, a name is generated using the deployment name
        name: ""

      # -- Environment variables to be set on the controller container
      env: []

      # -- Additional volumes to be mounted
      extraVolumes: []

      # -- Additional volume mounts
      extraVolumeMounts: []

      # -- Additional command line arguments
      extraArgs: []

      # -- Termination grace period in seconds
      terminationGracePeriodSeconds: 10
  agent:
      image: kserve/agent
      tag: ""
  router:
    image: kserve/router
    tag: ""
    # -- Specifies when to pull router image from registry.
    imagePullPolicy: "IfNotPresent"
    # -- specifies the list of secrets to be used for pulling the router image from registry.
    imagePullSecrets: []
  service:
    serviceClusterIPNone: false
  storage:
    image: kserve/storage-initializer
    tag: ""
    resources:
      requests:
        memory: 100Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: "1"
    # security context for the default storage container
    containerSecurityContext:
      allowPrivilegeEscalation: false
      privileged: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL

    # -- Flag for enabling model sidecar feature.
    enableModelcar: true

    # -- Model sidecar UID.
    uidModelcar: 1010

    # -- Model sidecar cpu requirement.
    cpuModelcar: 10m

    # -- Model sidecar memory requirement.
    memoryModelcar: 15Mi

    # -- Mounted CA bundle config map name for storage initializer.
    caBundleConfigMapName: ""

    # -- Mounted path for CA bundle config map.
    caBundleVolumeMountPath: "/etc/ssl/custom-certs"

    # -- Storage spec secret name.
    storageSpecSecretName: storage-config

    # -- Storage secret name reference for storage initializer.
    storageSecretNameAnnotation: serving.kserve.io/secretName

    # -- Configurations for S3 storage
    s3:
      # -- AWS S3 static access key id.
      accessKeyIdName: AWS_ACCESS_KEY_ID

      # -- AWS S3 static secret access key.
      secretAccessKeyName: AWS_SECRET_ACCESS_KEY

      # -- AWS S3 endpoint.
      endpoint: ""

      # -- Whether to use secured https or http to download models, allowed values are 0 and 1 and default to 1.
      useHttps: ""

      # -- Default region name of AWS S3.
      region: ""

      # -- Whether to verify the tls/ssl certificate, default to true.
      verifySSL: ""

      # -- Whether to use virtual bucket or not, default to false.
      useVirtualBucket: ""

      # -- Whether to use anonymous credentials to download the model or not, default to false.
      useAnonymousCredential: ""

      # -- Mounted CA bundle config map name.
      CABundleConfigMap: ""

      # -- When used with a configured CA bundle config map, specifies the full path (mount path + file name) for the mounted config map data.
      # When used absent of a configured CA bundle config map, specifies the path to a certificate bundle to use for HTTPS certificate validation.
      CABundle: ""
  metricsaggregator:
    # -- configures metric aggregation annotation. This adds the annotation serving.kserve.io/enable-metric-aggregation to every
    # service with the specified boolean value. If true enables metric aggregation in queue-proxy by setting env vars in the queue proxy container
    # to configure scraping ports.
    enableMetricAggregation: "false"

    # -- If true, prometheus annotations are added to the pod to scrape the metrics. If serving.kserve.io/enable-metric-aggregation is false,
    # the prometheus port is set with the default prometheus scraping port 9090, otherwise the prometheus port annotation is set with the metric aggregation port.
    enablePrometheusScraping: "false"
  controller:
    # -- KServe deployment mode: "Standard", "Knative".
    deploymentMode: "Knative"
    gateway:
      # -- Ingress domain for RawDeployment mode, for Serverless it is configured in Knative.
      domain: example.com
      # -- Optional additional domains for ingress routing.
      additionalIngressDomains: []
      # -- Ingress domain template for RawDeployment mode, for Serverless mode it is configured in Knative.
      domainTemplate: "{{ .Name }}-{{ .Namespace }}.{{ .IngressDomain }}"
      # -- pathTemplate specifies the template for generating path based url for each inference service.
      pathTemplate: ""
      # -- HTTP endpoint url scheme.
      urlScheme: http
      # -- DisableIstioVirtualHost controls whether to use istio as network layer.
      disableIstioVirtualHost: false
      # -- Whether to disable ingress creation for RawDeployment mode.
      disableIngressCreation: false
      localGateway:
        gateway: knative-serving/knative-local-gateway
        gatewayService: knative-local-gateway.istio-system.svc.cluster.local
        knativeGatewayService: ""
      ingressGateway:
        enableGatewayApi: false
        kserveGateway: kserve/kserve-ingress-gateway
        gateway: knative-serving/knative-ingress-gateway
        className: istio
  servingruntime:
    art:
      image: kserve/art-explainer
      defaultVersion: v0.16.0
  localmodel:
    enabled: false
    jobNamespace: kserve-localmodel-jobs
    jobTTLSecondsAfterFinished: 3600
    defaultJobImage: kserve/storage-initializer
    defaultJobTag: ""
    securityContext:
      fsGroup: 1000
    disableVolumeManagement: false
    agent:
      reconcilationFrequencyInSecs: 60
  security:
    autoMountServiceAccountToken: true
  inferenceservice:
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
  opentelemetryCollector:
    scrapeInterval: "5s"
    metricReceiverEndpoint: "keda-otel-scaler.keda.svc:4317"
    metricScalerEndpoint: "keda-otel-scaler.keda.svc:4318"
    resource:
      cpuLimit: "1"
      memoryLimit: "2Gi"
      cpuRequest: "200m"
      memoryRequest: "512Mi"
  autoscaler:
    scaleUpStabilizationWindowSeconds: "0"
    scaleDownStabilizationWindowSeconds: "300"
