name: "kserve-module Precommit Check"

on:
  pull_request:
    paths:
      - "kserve-module/**"
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precommit-check-km:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.3.1

      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5.6.0
        with:
          go-version-file: kserve-module/go.mod

      - name: Install dependencies
        run: cd kserve-module && go mod download

      - name: Check
        run: make check-km
