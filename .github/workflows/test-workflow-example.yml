# 이 파일을 테스트 repo의 .github/workflows/test-bot.yml 로 복사하세요.
# 테스트 후 삭제해도 됩니다.
name: Test KServe CI Bot App

on:
  workflow_dispatch:
    inputs:
      test-tag:
        description: "Test tag name (e.g., v0.0.1-test)"
        required: true
        default: "v0.0.1-test"

permissions:
  contents: write

jobs:
  test-bot-app:
    runs-on: ubuntu-latest
    steps:
    # Step 1: App token 생성 테스트
    - name: Generate App Token
      id: bot
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.KSERVE_BOT_APP_ID }}
        private-key: ${{ secrets.KSERVE_BOT_PRIVATE_KEY }}

    - name: Verify token was generated
      run: |
        if [ -z "${{ steps.bot.outputs.token }}" ]; then
          echo "::error::Failed to generate App token"
          exit 1
        fi
        echo "App token generated successfully"

    # Step 2: Release API로 tag + release 동시 생성
    # Release API에 target_commitish를 지정하면 GitHub가 내부적으로 tag를 생성하므로
    # 별도로 tag를 만들 필요 없이 Release 하나로 tag + release가 모두 생성됩니다.
    - name: Create Release via API (tag auto-created by GitHub)
      id: create-release
      env:
        GH_TOKEN: ${{ steps.bot.outputs.token }}
      run: |
        TAG_NAME="${{ inputs.test-tag }}"

        echo "Creating release with auto-created tag: $TAG_NAME"

        RESULT=$(gh api repos/${{ github.repository }}/releases \
          -f tag_name="$TAG_NAME" \
          -f target_commitish="${{ github.ref_name }}" \
          -f name="Test Release $TAG_NAME" \
          -f body="Test release created by kserve-ci-bot App." \
          -F draft=false \
          -F prerelease=true \
          -F generate_release_notes=false)

        RELEASE_URL=$(echo "$RESULT" | jq -r '.html_url')
        RELEASE_ID=$(echo "$RESULT" | jq -r '.id')

        echo "release-url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
        echo "release-id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
        echo "Release created: $RELEASE_URL"
        echo "Tag '$TAG_NAME' was auto-created by GitHub via Release API"

    # Step 3: Branch 생성 테스트
    - name: Get commit SHA from created tag
      id: get-sha
      env:
        GH_TOKEN: ${{ steps.bot.outputs.token }}
      run: |
        TAG_NAME="${{ inputs.test-tag }}"
        SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/$TAG_NAME --jq '.object.sha')
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        echo "Tag $TAG_NAME points to: $SHA"

    - name: Create branch via API
      id: create-branch
      env:
        GH_TOKEN: ${{ steps.bot.outputs.token }}
      run: |
        COMMIT_SHA="${{ steps.get-sha.outputs.sha }}"
        BRANCH_NAME="test/bot-branch-$(date +%s)"

        echo "Creating branch: $BRANCH_NAME -> $COMMIT_SHA"

        gh api repos/${{ github.repository }}/git/refs \
          -f ref="refs/heads/$BRANCH_NAME" \
          -f sha="$COMMIT_SHA"

        echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
        echo "Branch '$BRANCH_NAME' created"

    - name: Summary
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Release: ${{ steps.create-release.outputs.release-url }}" >> $GITHUB_STEP_SUMMARY
        echo "- Tag: \`${{ inputs.test-tag }}\` (auto-created by Release API)" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: \`${{ steps.create-branch.outputs.branch-name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Verify" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to **Tags** page — check if the tag shows a **Verified** badge" >> $GITHUB_STEP_SUMMARY
        echo "2. Go to **Releases** — check the release was created by the bot" >> $GITHUB_STEP_SUMMARY
        echo "3. Check **Actions** tab — see if downstream workflows were triggered" >> $GITHUB_STEP_SUMMARY

  # Cleanup job - 테스트 후 자동 정리
  cleanup:
    needs: test-bot-app
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Generate App Token
      id: bot
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.KSERVE_BOT_APP_ID }}
        private-key: ${{ secrets.KSERVE_BOT_PRIVATE_KEY }}

    - name: Cleanup test tag and release
      env:
        GH_TOKEN: ${{ steps.bot.outputs.token }}
      run: |
        TAG_NAME="${{ inputs.test-tag }}"

        echo "Cleaning up test resources..."

        # Delete release (if exists)
        RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG_NAME --jq '.id' 2>/dev/null || echo "")
        if [ -n "$RELEASE_ID" ]; then
          gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID
          echo "Deleted release: $RELEASE_ID"
        fi

        # Delete tag ref
        gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/$TAG_NAME 2>/dev/null && \
          echo "Deleted tag: $TAG_NAME" || echo "Tag already deleted or not found"

        # Delete test branches
        echo "Cleaning up test branches..."
        gh api repos/${{ github.repository }}/git/matching-refs/heads/test/bot-branch- --jq '.[].ref' 2>/dev/null | while read ref; do
          gh api -X DELETE "repos/${{ github.repository }}/git/$ref" 2>/dev/null && \
            echo "Deleted branch: $ref" || true
        done

        echo "Cleanup complete"

