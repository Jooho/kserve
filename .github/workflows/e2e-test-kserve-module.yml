name: kserve-module E2E Tests

on:
  # Enable after e2e test PR is merged:
  # push:
  #   branches: [master, release*, stable]
  #   paths:
  #     - "kserve-module/**"
  # pull_request:
  #   branches: [master, release*, stable]
  #   paths:
  #     - "kserve-module/**"
  workflow_dispatch:

env:
  IMG_NAME: kserve-module-controller
  IMG_TAG: e2e

jobs:
  kserve-module-image-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Build controller image
        run: |
          docker build --load \
            -t ${{ env.IMG_NAME }}:${{ env.IMG_TAG }} \
            -f kserve-module-controller.Dockerfile .

      - name: Save image as artifact
        run: |
          docker save ${{ env.IMG_NAME }}:${{ env.IMG_TAG }} \
            -o /tmp/${{ env.IMG_NAME }}.tar

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMG_NAME }}
          path: /tmp/${{ env.IMG_NAME }}.tar
          retention-days: 1

  e2e-test:
    needs: kserve-module-image-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Setup Minikube
        uses: ./.github/actions/minikube-setup

      - name: Download controller image
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMG_NAME }}
          path: /tmp

      - name: Load controller image
        run: |
          docker image load -i /tmp/${{ env.IMG_NAME }}.tar
          minikube image load ${{ env.IMG_NAME }}:${{ env.IMG_TAG }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Setup cluster and deploy controller
        run: make e2e-setup-kserve-module PLATFORM=xks E2E_IMG=${{ env.IMG_NAME }}:${{ env.IMG_TAG }}

      - name: Run E2E tests
        run: make e2e-kserve-module

      - name: Collect debug logs
        if: failure()
        run: |
          echo "=== Controller logs ==="
          kubectl logs deployment/kserve-module-controller-manager -n opendatahub --tail=200 || true
          echo "=== Kserve CR ==="
          kubectl get kserve -A -o yaml || true
          echo "=== Pods ==="
          kubectl get pods -n opendatahub || true
          echo "=== Events ==="
          kubectl get events -n opendatahub --sort-by='.lastTimestamp' | tail -30 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: kserve-module/tests/e2e/.pytest_cache/
          retention-days: 7
