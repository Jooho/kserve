name: Upload Python Package

on:
  pull_request:
    types: [closed]
    branches: [master]
    paths:
      - 'python/VERSION'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-trigger:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.title, 'release: prepare KServe')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger conditions met
        run: echo "PyPI publish triggered"

  publish-kserve:
    needs: check-trigger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: ./test/scripts/gh-actions/setup-uv.sh
      - name: KServe - Build and publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd python/kserve
          uv build
          uv publish
  publish-storage:
    needs: check-trigger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: ./test/scripts/gh-actions/setup-uv.sh

      - name: KServe Storage - Build and publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.KSERVE_STORAGE_PYPI_TOKEN }}
        run: |
          cd python/storage
          uv build
          uv publish
