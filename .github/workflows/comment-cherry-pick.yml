name: Cherry Pick On Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    name: Validate Cherry Pick Request
    if: github.event.issue.pull_request != '' && contains(github.event.comment.body, '/cherry-pick') && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'CONTRIBUTOR')
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR is merged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          PR_STATE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json state -q .state)
          PR_MERGED=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json mergedAt -q .mergedAt)

          if [[ "$PR_STATE" != "MERGED" ]] || [[ "$PR_MERGED" == "null" ]]; then
            echo "❌ Error: PR #$PR_NUMBER is not merged yet"
            echo "   Current state: $PR_STATE"
            echo "   Cherry-pick can only be performed on merged PRs"
            exit 1
          fi

          echo "✅ PR #$PR_NUMBER is merged"

  cherry-pick:
    name: Cherry Pick
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the latest code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch PR commits
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          echo "Fetching PR #$PR_NUMBER commits"
          git fetch origin "pull/$PR_NUMBER/head:pr-$PR_NUMBER"

      - name: Clean up existing cherry-pick branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract target branch from comment
          COMMENT_BODY="${{ github.event.comment.body }}"
          TARGET_BRANCH=$(echo "$COMMENT_BODY" | awk '{print $2}' | tr -d '[:space:]')

          # Get source branch name from PR
          PR_NUMBER="${{ github.event.issue.number }}"
          HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName -q .headRefName)

          # Calculate cherry-pick branch name (same logic as the action)
          CHERRY_BRANCH="cherry/${TARGET_BRANCH}/${HEAD_BRANCH}"

          echo "Attempting to delete existing cherry-pick branch: $CHERRY_BRANCH"

          # Try to delete the remote branch if it exists (ignore errors)
          git push origin ":$CHERRY_BRANCH" 2>/dev/null || echo "Branch $CHERRY_BRANCH not found or already deleted"

          echo "Cleanup completed, ready for fresh cherry-pick"

      - name: Automatic Cherry Pick
        uses: hianhianhian/gha-cherry-pick@c88f57e55a9eabd96f94edba6d584b37633836d1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
