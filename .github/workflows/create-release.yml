name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.17.0-rc0, v0.17.0-rc1, v0.17.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry-run mode (validate only, no changes)'
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          # Install yq for OWNERS file parsing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Check OWNERS permissions
        run: |
          echo "Checking permissions for user: ${{ github.actor }}"

          # Extract allowed users from OWNERS file
          ALLOWED_USERS=$(yq eval '.project-leads[], .approvers[], .reviewers[]' OWNERS)

          # Check if current user is in the allowed list
          if ! echo "$ALLOWED_USERS" | grep -q "^${{ github.actor }}$"; then
            echo ""
            echo "❌ Permission denied!"
            echo "   Only users listed in OWNERS (reviewer+) can run this workflow."
            echo "   Current user: ${{ github.actor }}"
            echo ""
            echo "Allowed users:"
            echo "$ALLOWED_USERS"
            exit 1
          fi

          echo "✅ Permission granted for ${{ github.actor }}"

      - name: Create Branch and Tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ./hack/create-release.sh "${{ inputs.version }}" --dry-run --github-actions
          else
            ./hack/create-release.sh "${{ inputs.version }}" --github-actions
          fi

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"

          # Check if version contains rc (pre-release)
          if [[ "$VERSION" == *"-rc"* ]]; then
            PRERELEASE="--prerelease"
          else
            PRERELEASE=""
          fi

          # Get previous tag for changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate auto-generated notes from GitHub
          echo "Generating release notes..."
          AUTO_NOTES=$(gh api repos/:owner/:repo/releases/generate-notes \
            -F tag_name="$VERSION" \
            -F target_commitish="$(git rev-parse HEAD)" \
            ${PREV_TAG:+-F previous_tag_name="$PREV_TAG"} \
            --jq .body)

          # Create comprehensive release notes
          RELEASE_NOTES=$(cat <<EOF
          ## Installation

          Install KServe ${VERSION}:

          \`\`\`bash
          kubectl apply -f https://github.com/kserve/kserve/releases/download/${VERSION}/kserve.yaml
          \`\`\`

          Or using the install script:
          \`\`\`bash
          curl -s "https://raw.githubusercontent.com/kserve/kserve/${VERSION}/hack/quick_install.sh" | bash
          \`\`\`

          ## What's Changed

          ${AUTO_NOTES}

          ## Documentation

          - [KServe Website](https://kserve.github.io/website/)

          **Full Changelog**: https://github.com/kserve/kserve/compare/${PREV_TAG}...${VERSION}
          EOF
          )

          # Create GitHub Release
          gh release create "$VERSION" \
            --title "KServe $VERSION" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE

          echo ""
          echo "✅ GitHub Release created successfully!"
          echo ""
          echo "Release URL:"
          gh release view "$VERSION" --json url -q .url
